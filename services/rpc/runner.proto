syntax = "proto3";

service Runner {
    rpc Execute (ExecutionRequest) returns (ExecutionResponse);
}

message ExecutionRequest {
    string language = 1;
    string version = 2;
    string source_code = 3;
    repeated string stdins = 4;
    string exec_id = 5;
}

message ExecutionResponse {
    int32 total_tests = 1;
    int32 passed_tests = 2;
    int32 failed_tests = 3;
    int32 timeouts = 4;
}
