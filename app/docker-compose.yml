services:

  api:
    build: 
      context: .
      dockerfile: docker/api/Dockerfile
    image: api-borealis:latest
    container_name: borealis-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - runner

  runner:
    build: 
      context: .
      dockerfile: docker/execution/Dockerfile
    image: runner-borealis:latest
    container_name: borealis-runner
    ports:
      - "50051:50051"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  
  redis:
    container_name: borealis-redis
    image: redis:7 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: {}