services:

  Borealis:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    image: app-borealis:latest
    container_name: borealis
    privileged: true
    pid: "host"
    ports:
      - "8000:8000"
    env_file:
      - .env
  
  Redis:
    container_name: borealis-redis
    image: redis:7 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: {}